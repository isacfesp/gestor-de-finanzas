# Deploy a producción (VPS propio, no Easypanel): arma las imágenes de
# backend/frontend con los Dockerfile.prod ya existentes, las sube a GHCR
# y termina conectándose por SSH al VPS para hacer pull + up. Nunca
# compila Rust en el VPS — todo el build de Cargo/Trunk ocurre acá.
#
# Se dispara solo después de que el workflow "CI" (ci.yml) termine en
# verde sobre main; workflow_dispatch queda como respaldo para el primer
# deploy (workflow_run no dispara hasta que este archivo ya está en main)
# o para redesplegar a mano sin esperar un push nuevo.
name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  BACKEND_IMAGE: ghcr.io/isacfesp/gestor-de-finanzas-backend
  FRONTEND_IMAGE: ghcr.io/isacfesp/gestor-de-finanzas-frontend

jobs:
  build-backend:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/docker/Dockerfile.prod
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/docker/Dockerfile.prod
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # docker-compose.prod.yml se sobreescribe en cada deploy; el .env
      # con los secretos reales vive solo en el VPS y nunca se toca acá.
      - name: Copiar docker-compose.prod.yml al VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "/opt/gestor"

      - name: Pull de las imágenes nuevas y reinicio de contenedores
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/gestor
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

# Orquestación del proyecto, pensada para el deploy (Easypanel construye
# directo desde este archivo). Sin "ports" en ningún servicio: nadie
# publica puertos al host, todo se resuelve por nombre de servicio dentro
# de la red interna de compose (db, app, frontend) — así Easypanel puede
# enrutar por su propio proxy sin chocar con puertos de otros proyectos
# en la misma VPS.
#
# Para desarrollo local, donde sí necesitas entrar por localhost desde el
# navegador, usa:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up --build
#
# Compose lee las variables ${...} del archivo .env que está en esta misma
# carpeta (la raíz). Por eso el .env vive aquí y no en backend/.
#
# Tres servicios: db (Postgres), app (backend, hot-reload con cargo-watch)
# y frontend (Trunk sirviendo el SPA con hot-reload).

services:
  db:
    image: postgres:15-alpine
    restart: always
    # Sin "ports": el backend ya llega a Postgres por "db:5432" dentro de la
    # red interna de compose, no hace falta publicarlo al host. Publicarlo
    # rompía el deploy en Easypanel cuando otro proyecto de la misma VPS ya
    # tenía el 5432 del host ocupado. Para conectar DBeaver/sqlx-cli en
    # local usa `docker compose exec db psql -U $DB_USER -d $DB_NAME`, o
    # agrega el mapeo de vuelta solo en tu máquina si lo necesitas.
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      # Persistencia: las tablas sobreviven aunque el contenedor se destruya.
      - db_data:/var/lib/postgresql/data
    healthcheck:
      # pg_isready responde OK solo cuando Postgres ya acepta conexiones.
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 3s
      timeout: 3s
      retries: 10

  app:
    build:
      context: backend/docker # ahí vive el Dockerfile; el código no se copia, se monta abajo
    restart: always
    environment:
      # Dentro de la red de compose, la base de datos se llama "db", no localhost.
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      PORT: ${PORT}
      # sqlx::query!/query_as! validan el SQL en tiempo de compilación. Sin
      # esto, contra una base recién creada (sin migrar todavía) la
      # compilación falla con "relation ... does not exist": las
      # migraciones solo corren cuando el binario ya compilado arranca,
      # nunca antes. Con offline=true usa el caché de backend/.sqlx en vez
      # de conectarse a la base durante el build.
      SQLX_OFFLINE: "true"
    volumes:
      # Se monta el repo completo: cargo-watch recompila al detectar cambios (hot-reload).
      - ./:/usr/src/app
      # Cachés para no volver a descargar dependencias ni recompilar todo en cada arranque.
      - cargo_cache:/usr/local/cargo/registry
      - target_cache:/usr/src/app/target
    depends_on:
      db:
        # El backend arranca solo cuando el healthcheck de arriba pasa,
        # así el pool de conexiones no falla por llegar antes que Postgres.
        condition: service_healthy

  frontend:
    build:
      context: frontend/docker # ahí vive el Dockerfile; el código no se copia, se monta abajo
    restart: always
    volumes:
      # Mismo repo completo que "app": frontend/ es miembro del mismo
      # workspace de Cargo y necesita ver el Cargo.toml/lock de la raíz.
      - ./:/usr/src/app
      # Cachés propias: no comparte target/ con "app" porque compila a
      # wasm32 (un target distinto) y correrían en paralelo sobre el mismo
      # directorio. El registro de crates sí se comparte, es solo lectura
      # de paquetes ya descargados.
      - cargo_cache:/usr/local/cargo/registry
      - frontend_target_cache:/usr/src/app/target
      # Binarios que Trunk descarga por su cuenta (wasm-bindgen, wasm-opt,
      # dart-sass) para no volver a bajarlos en cada `docker compose up`.
      - trunk_tools_cache:/root/.cache
    depends_on:
      - app

volumes:
  db_data:
  cargo_cache:
  target_cache:
  frontend_target_cache:
  trunk_tools_cache:
